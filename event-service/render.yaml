services:
  - type: web
    name: eventhub-node-api
    env: node
    region: frankfurt
    plan: free
    rootDir: eventhub-node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DB_SSL
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false