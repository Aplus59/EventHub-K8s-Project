apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: backend-sa
      containers:
        - name: auth-service
          image: ricaml/auth-service:v2
          ports:
            - containerPort: 5000
          env:
            - name: NODE_ENV
              value: "development"
            - name: PORT
              value: "5000"
            - name: DB_SSL
              value: "false"
            - name: DATABASE_URL
              value: "postgresql://postgres:rootpassword@postgres:5432/eventhub"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: eventhub-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              value: "24h"

---

apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: default
spec:
  selector:
    app: auth-service
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP